# Nixpacks override mínimo para Coolify + Laravel 11
# Razón: el package:discover de blade-ui-kit/blade-icons falla durante
# composer install (build time) porque las paths storage/framework no
# están resueltas todavía. Skipping scripts en install y ejecutando
# `package:discover` + `migrate` en runtime.

[phases.install]
cmds = [
    "composer install --no-dev --prefer-dist --no-interaction --no-scripts --optimize-autoloader",
    "npm ci"
]

# Antes de arrancar nginx + php-fpm, ejecutamos los scripts saltados +
# migrations + storage:link. `start.sh` lo crea Nixpacks; encadenamos
# nuestros comandos a través de NIXPACKS_PRE_START_COMMAND si Nixpacks
# lo soporta, o por env. Como fallback, ejecutamos package:discover
# explícitamente aquí.
[phases.build]
cmds = [
    "mkdir -p bootstrap/cache storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs",
    "chmod -R 775 bootstrap/cache storage",
    "php artisan package:discover --no-interaction --ansi",
    "npm run build"
]
