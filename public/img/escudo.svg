<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 144" aria-label="Escudo Algeciras CF" role="img">
  <title>Algeciras Club de Fútbol</title>
  <!-- Corona -->
  <g>
    <path d="M14 18 L20 6 L26 18 L34 8 L42 18 L52 4 L60 18 L70 8 L78 18 L86 6 L92 18 L92 24 L14 24 Z"
          fill="#D4A24C" stroke="#0A0A0A" stroke-width="1.5" stroke-linejoin="round"/>
    <circle cx="20" cy="4" r="2.2" fill="#E30A2C"/>
    <circle cx="34" cy="6" r="2" fill="#E30A2C"/>
    <circle cx="52" cy="2" r="2.5" fill="#E30A2C"/>
    <circle cx="70" cy="6" r="2" fill="#E30A2C"/>
    <circle cx="86" cy="4" r="2.2" fill="#E30A2C"/>
  </g>
  <!-- Triángulo invertido (escudo) con borde dorado -->
  <path d="M8 28 L112 28 L60 138 Z"
        fill="#FFFFFF" stroke="#D4A24C" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Franjas rojas verticales (5 franjas como el escudo real) -->
  <path d="M30 28 L38 28 L58 70 L54 70 Z" fill="#E30A2C"/>
  <path d="M44 28 L52 28 L60 56 L56 56 Z" fill="#E30A2C"/>
  <path d="M58 28 L66 28 L66 138 L60 138 Z" fill="#E30A2C"/>
  <path d="M70 28 L78 28 L66 56 L62 56 Z" fill="#E30A2C"/>
  <path d="M84 28 L92 28 L66 70 L62 70 Z" fill="#E30A2C"/>
  <!-- Texto interior -->
  <text x="60" y="62" text-anchor="middle"
        font-family="Bebas Neue, Anton, Impact, sans-serif"
        font-size="13" font-weight="900" fill="#0A0A0A" letter-spacing="1">ALGECIRAS</text>
  <text x="60" y="78" text-anchor="middle"
        font-family="Bebas Neue, Anton, Impact, sans-serif"
        font-size="11" font-weight="900" fill="#0A0A0A" letter-spacing="2">C.F.</text>
  <!-- Torre stylized en V -->
  <g transform="translate(60,98)" fill="#0A0A0A">
    <rect x="-9" y="0" width="18" height="14" />
    <rect x="-12" y="-6" width="6" height="8"/>
    <rect x="6" y="-6" width="6" height="8"/>
    <rect x="-3" y="-6" width="6" height="8"/>
    <rect x="-2" y="3" width="4" height="6" fill="#E30A2C"/>
  </g>
  <!-- Laureles -->
  <g stroke="#1A6B2E" stroke-width="1.5" fill="none">
    <path d="M40 95 Q35 105 42 118"/>
    <path d="M80 95 Q85 105 78 118"/>
  </g>
</svg>
